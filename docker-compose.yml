version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ML_SERVICE_URL=http://ml:8000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - ml

  ml:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ml/models:/app/models

volumes:
  ml-models:
